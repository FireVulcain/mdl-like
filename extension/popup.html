<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drama Calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <span class="header-title">Drama Calendar</span>
      </div>
      <div class="header-actions">
        <button id="btn-refresh" class="icon-btn" title="Refresh data">
          <svg id="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Settings panel (hidden by default) -->
    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-title">Settings</div>
      <div class="settings-row">
        <label class="settings-label">Countries</label>
        <div class="country-toggles">
          <label class="country-toggle"><input type="checkbox" data-country="korean" checked /> 🇰🇷 Korean</label>
          <label class="country-toggle"><input type="checkbox" data-country="chinese" checked /> 🇨🇳 Chinese</label>
          <label class="country-toggle"><input type="checkbox" data-country="japanese" /> 🇯🇵 Japanese</label>
          <label class="country-toggle"><input type="checkbox" data-country="thai" /> 🇹🇭 Thai</label>
        </div>
      </div>
      <div class="settings-row">
        <label class="settings-label">Shows per country</label>
        <select id="shows-per-country">
          <option value="5">5</option>
          <option value="8" selected>8</option>
          <option value="12">12</option>
        </select>
      </div>
      <button id="btn-save-settings" class="save-btn">Save &amp; Refresh</button>
    </div>

    <!-- Month navigation -->
    <div class="month-nav">
      <button id="btn-prev" class="nav-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span id="month-label" class="month-label">Loading…</span>
      <button id="btn-next" class="nav-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button id="btn-today" class="today-btn">Today</button>
    </div>

    <!-- Calendar grid -->
    <div class="calendar-section">
      <div class="day-headers">
        <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span>
        <span class="weekend">SAT</span><span class="weekend">SUN</span>
      </div>
      <div id="calendar-cells" class="calendar-cells"></div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Agenda panel -->
    <div class="agenda-section">
      <div id="agenda-header" class="agenda-header">Select a day</div>
      <div id="agenda-list" class="agenda-list">
        <div class="empty-state">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <p>Loading schedule…</p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span id="footer-text" class="footer-text">Fetching data…</span>
      <span class="footer-brand">Powered by Kuryana</span>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
