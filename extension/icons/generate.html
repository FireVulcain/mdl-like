<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate Drama Calendar Icons</title>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; padding: 30px; }
  canvas { display: none; }
  button { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 16px; }
  button:hover { opacity: 0.85; }
  p { margin: 8px 0; font-size: 13px; color: #94a3b8; }
</style>
</head>
<body>
<h2>Drama Calendar — Icon Generator</h2>
<p>Click the button below to generate and download the three icon PNGs needed by the extension.</p>
<p>Place them in the <code>extension/icons/</code> folder.</p>
<button onclick="generateAll()">Generate &amp; Download Icons</button>

<script>
function drawIcon(size) {
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");
  const r = size * 0.14;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, "#1e1b4b");
  grad.addColorStop(1, "#090912");
  ctx.fillStyle = grad;
  roundRect(ctx, 0, 0, size, size, r);
  ctx.fill();

  // Outer glow ring
  ctx.shadowColor = "#6366f1";
  ctx.shadowBlur = size * 0.12;

  // Calendar icon (white)
  ctx.shadowBlur = 0;
  ctx.strokeStyle = "#a5b4fc";
  ctx.lineWidth = size * 0.07;
  ctx.lineJoin = "round";
  ctx.lineCap  = "round";

  const p = size * 0.18;  // padding
  const w = size - p * 2;
  const h = w * 0.85;
  const cr = size * 0.08;

  // Rectangle body
  ctx.beginPath();
  roundRect(ctx, p, p + size * 0.1, w, h, cr);
  ctx.stroke();

  // Top bar (fills rectangle top area)
  ctx.fillStyle = "#6366f1";
  ctx.beginPath();
  roundRectTop(ctx, p, p + size * 0.1, w, h * 0.3, cr);
  ctx.fill();

  // Handle pegs
  ctx.strokeStyle = "#a5b4fc";
  ctx.lineWidth = size * 0.07;
  const pegY1 = p + size * 0.04;
  const pegY2 = p + size * 0.22;
  const peg1x = p + w * 0.27;
  const peg2x = p + w * 0.73;
  ctx.beginPath(); ctx.moveTo(peg1x, pegY1); ctx.lineTo(peg1x, pegY2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(peg2x, pegY1); ctx.lineTo(peg2x, pegY2); ctx.stroke();

  // Grid dots
  ctx.fillStyle = "#e2e8f0";
  const dotSize = size * 0.055;
  const gridTop  = p + size * 0.1 + h * 0.38;
  const gridLeft = p + w * 0.15;
  const colStep  = w * 0.25;
  const rowStep  = h * 0.22;
  for (let row = 0; row < 2; row++) {
    for (let col = 0; col < 3; col++) {
      if (row === 1 && col === 2) continue; // skip last
      ctx.beginPath();
      ctx.arc(gridLeft + col * colStep, gridTop + row * rowStep, dotSize, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function roundRectTop(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function generateAll() {
  [16, 48, 128].forEach(size => {
    const canvas = drawIcon(size);
    const link = document.createElement("a");
    link.download = `icon${size}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}
</script>
</body>
</html>
